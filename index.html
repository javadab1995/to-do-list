<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
   

    <title>To Do List </title>
  </head>
  <body class="relative text-yellow-950 bg-yellow-50">
    <div>
      <header class="bg-yellow-100 flex items-center justify-between w-full px-4 py-2">
        <h1 class="font-bold text-2xl md:text-3xl">To-Do-List</h1>
        <div>
          <p class="text-yellow-700 font-bold">Manage Your works</p>
        </div>
      </header>


      <div
        class="confirmDelete p-4 bg-yellow-100/80 top-16 transition-all duration-300 ease-in-out backdrop-blur-md hidden md:w-100 w-80 fixed shadow-md -translate-x-1/2 left-1/2 rounded-md"
      >
        <span>Are you sure you want to delete this item?</span>
        <div class="w-full flex gap-2 justify-end mt-4  text-yellow-50 ">
          <button class="w-2/12 border bg-blue-400 rounded-md btn-delete">
            Yes
          </button>
          <button class="w-2/12 border bg-red-500 rounded-md btn-cancel">
            No
          </button>
        </div>
      </div>

      <div class="mt-10 w-full flex lg:flex-row flex-col justify-center p-4 gap-4 ">
        <form class="w-full lg:w-1/2 flex  flex-col lg:flex-row  gap-5">
          <label class="flex flex-col w-full " for="item">
            <input
              id="taskInput"
              placeholder="type your mind..."
              class="  border-2 border-yellow-100 focus:ring-2 focus:ring-yellow-300 focus:border-yellow-500 w-full py-2 rounded-md focus:outline-none px-4"
              type="text"
              required
              minlength="3"
              maxlength="50"
            />
            <span class="text-red-500 text-sm error"></span>
          </label>

          <label
            for="deadline"
            class="w-full"
          >
            <input id="deadlineInput" name="deadline" type="datetime-local"  class="  border-2 border-yellow-100 focus:ring-2 focus:ring-yellow-300 focus:border-yellow-500 w-full py-2 rounded-md focus:outline-none px-4" />
          </label>

          <div class="lg:w-2/12  flex flex-col">
            <button
              id="btnAddTask"
              class="bg-yellow-700 rounded-md py-2 px-4 text-yellow-50"
            >
              submit
            </button>
          </div>
        </form>
        <div class=" w-full lg:w-1/2 flex flex-col items-center justify-center  ">
      <ul class="list   w-full rounded-md border-2 border-yellow-100"></ul>
    </div>
      </div>
    </div>

    
    

    <script src="./src/script.js" type="module"></script>
  </body>
</html>
